---
- name: COPR Erlang update
  hosts: all
  tasks:
    - name: Trigger COPR build via webhooks for erlang-27
      ansible.builtin.uri:
        url: "https://copr.fedorainfracloud.org/webhooks/custom/{{ kolla_copr_erlang27.id }}/{{ kolla_copr_erlang27.uuid }}/erlang"
        method: POST
      no_log: true

    - name: Trigger COPR build via webhooks for erlang-26
      ansible.builtin.uri:
        url: "https://copr.fedorainfracloud.org/webhooks/custom/{{ kolla_copr_erlang26.id }}/{{ kolla_copr_erlang26.uuid }}/erlang"
        method: POST
      no_log: true
