---
- project-template:
    name: kolla-scenario-ironic
    description: |
      Runs Kolla-Ansible Ironic scenario jobs on particular Kolla changes.
    check:
      jobs:
        - kolla-ansible-debian-trixie-ironic: &files
            files: ^kolla/docker\/(base|dnsmasq|ironic|iscsid|openstack-base)\/.*
        - kolla-ansible-rocky-10-ironic: *files
        - kolla-ansible-ubuntu-noble-ironic: *files
