---
- project-template:
    name: kolla-scenario-cephadm
    description: |
      Runs Kolla-Ansible CephAdm scenario jobs on particular Kolla changes.
    check:
      jobs:
        - kolla-ansible-debian-trixie-cephadm: &files
            files: ^kolla/docker\/(base|cinder|glance|mariadb-server|openstack-base|rabbitmq)\/.*
        - kolla-ansible-debian-bookworm-cephadm-upgrade: *files
        - kolla-ansible-rocky-10-cephadm: *files
        - kolla-ansible-rocky-10-cephadm-upgrade: *files
        - kolla-ansible-ubuntu-noble-cephadm: *files
        - kolla-ansible-ubuntu-noble-cephadm-upgrade: *files
