---
- project-template:
    name: kolla-scenario-masakari
    description: |
      Runs Kolla-Ansible Masakari scenario jobs on particular Kolla changes.
    check:
      jobs:
        - kolla-ansible-debian-trixie-masakari: &files
            files: ^kolla/docker/(base|masakari|openstack-base)/
        - kolla-ansible-rocky-10-masakari: *files
        - kolla-ansible-ubuntu-noble-masakari: *files
